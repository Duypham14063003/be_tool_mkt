services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing
      POSTGRES_DB: marketing
    ports: [ "5433:5432" ]
    volumes: [ postgres_data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U marketing" ]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: .
    env_file: .env
    command: [ "sh", "-c", "npx prisma migrate deploy && node dist/main.js" ]
    ports: [ "3000:3000" ]
    volumes: [ reports:/app/reports ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  worker:
    build: .
    env_file: .env
    command: [ "node", "dist/worker.js" ]
    volumes: [ reports:/app/reports, playwright_artifacts:/app/playwright-artifacts ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
volumes:
  postgres_data:
  reports:
  playwright_artifacts:
